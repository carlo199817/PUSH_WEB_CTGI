<!DOCTYPE html>
<html>
  <head>
    <title>Please wait, redirecting...</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
        background-color: #f8f9fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        color: #333;
      }

      .loader {
        border: 5px solid #eee;
        border-top: 5px solid #007bff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      p {
        font-weight: normal;
        font-size: 16px;
        margin: 0;
      }
    </style>
    <script>
      window.onload = function () {
        const urlParams = new URLSearchParams(window.location.search);
        let idRaw = urlParams.get('id');
        let selectConfiguration = urlParams.get('configuration');
        if (idRaw) {
            localStorage.setItem("redirected_task_id",idRaw); 
            localStorage.setItem("select_configuration",selectConfiguration); 
            const timer = setTimeout(() => {
                 window.location.href = "/FormTesting/"; 
            }, 1000);
        } else {
          document.querySelector("p").textContent = "Missing ID in URL.";
          document.querySelector(".loader").style.display = "none";
        }
      };
    </script>
  </head>
  <body>
    <div class="loader"></div>
    <p>Please wait, redirecting...</p>
  </body>
</html>
